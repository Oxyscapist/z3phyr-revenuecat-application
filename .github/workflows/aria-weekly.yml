name: ARIA Weekly Run

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider override (gemini|mock|openai)"
        required: false
        default: ""
  schedule:
    # Mondays 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ARIA_AGENT_NAME: ARIA
      ARIA_APPROVAL_MODE: human
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARIA_GITHUB_TOKEN: ${{ secrets.ARIA_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Resolve Week Start + Provider
        id: vars
        shell: bash
        run: |
          WEEK_START=$(python - <<'PY'
          from datetime import date, timedelta
          today = date.today()
          monday = today - timedelta(days=today.weekday())
          print(monday.isoformat())
          PY
          )
          PROVIDER="${{ github.event.inputs.provider }}"
          if [ -z "$PROVIDER" ]; then
            if [ -n "$GEMINI_API_KEY" ]; then
              PROVIDER="gemini"
            else
              PROVIDER="mock"
            fi
          fi
          echo "week_start=$WEEK_START" >> "$GITHUB_OUTPUT"
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"

      - name: Run Weekly Pipeline
        run: |
          python -m aria run-weekly \
            --week-start "${{ steps.vars.outputs.week_start }}" \
            --provider "${{ steps.vars.outputs.provider }}" \
            --queue-content-gists

      - name: Build Dashboard
        run: |
          python -m aria dashboard --week-start "${{ steps.vars.outputs.week_start }}" --output-stem latest

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria-weekly-${{ steps.vars.outputs.week_start }}
          path: |
            artifacts/
            data/aria.db
